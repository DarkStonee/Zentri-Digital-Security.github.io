<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZENTRI - Actualizando</title>

<style>

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

/* FONDO */
body {
    background: radial-gradient(circle, #020617, #000);
    color: #3b82f6;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CONTENEDOR */
.container {
    text-align: center;
}

/* TEXTO */
h1 {
    font-size: 1.5rem;
    margin-bottom: 20px;
}

/* SUBTEXTO */
p {
    opacity: 0.7;
    font-size: 0.9rem;
}

/* ENGRANAJES */
.gears {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 25px;
}

/* SVG */
.gear {
    width: 60px;
    height: 60px;
    fill: #3b82f6;
}

/* ANIMACIONES */
.spin {
    animation: spin 3s linear infinite;
}

.spin-reverse {
    animation: spinReverse 4s linear infinite;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

@keyframes spinReverse {
    from { transform: rotate(360deg); }
    to { transform: rotate(0deg); }
}

/* EFECTO PARPADEO */
.dots::after {
    content: "";
    animation: dots 1.5s infinite;
}

@keyframes dots {
    0% { content: ""; }
    33% { content: "."; }
    66% { content: ".."; }
    100% { content: "..."; }
}

</style>
</head>
